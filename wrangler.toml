name = "widgetly"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# ===========================================================================
# Worker environments
# ---------------------------------------------------------------------------
# Each environment is fully isolated (its own Worker name, KV namespace,
# and D1 database). Switching is via `--env <name>` on the wrangler CLI;
# the CI workflows do this automatically:
#
#   push to develop → deploy with --env stage     (stage.widgetly.tech)
#   push to main    → deploy with --env production (widgetly.tech)
#
# Bindings are scoped to each `[env.X]` block. The top-level has NO
# KV/D1 bindings — putting them at the top would collide with the
# per-env blocks because wrangler merges top-level + env-scoped
# bindings (and binding names must be unique).
#
# pnpm scripts:
#   pnpm deploy         = build + wrangler deploy --env production
#   pnpm deploy:stage   = build + wrangler deploy --env stage
#   pnpm db:migrate:remote  = wrangler d1 migrations apply widgetly      --remote
#   pnpm db:migrate:stage   = wrangler d1 migrations apply widgetly-stage --remote --env stage
# ===========================================================================

# ---------------------------------------------------------------------------
# Production KV (OpenNext incremental cache).
#
# Backing store for prerendered HTML pages (`force-static` routes). Without
# this, OpenNext re-renders every request — the previous `incrementalCache:
# "dummy"` config in open-next.config.ts caused the Worker to spin on every
# request, which is what was triggering the random Error 1102s.
#
# KV is included in Workers Free (100K reads/day, 1K writes/day, 1 GB).
# ---------------------------------------------------------------------------
[env.production]
name = "widgetly"

[[env.production.kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "0e35b410aaf04be18d7cb17e54bc9cfb"
preview_id = "d85f0da78ed64650a9502783e03f116f"

# Production D1: waitlist + tool suggestions + leaderboard + admin.
[[env.production.d1_databases]]
binding = "DB"
database_name = "widgetly"
database_id = "64cbb0d4-af76-46cf-a742-cf78902f1dc3"

# ===========================================================================
# STAGE ENVIRONMENT
# ---------------------------------------------------------------------------
# A completely separate Worker + D1 + KV. Reachable at stage.widgetly.tech.
# CI deploys push-to-develop here; production deploys push-to-main.
#
# Setup (one-time, on your local machine):
#   1. wrangler kv namespace create NEXT_INC_CACHE_KV --env stage
#   2. wrangler d1 create widgetly-stage
#   3. Paste the printed IDs into the [env.stage] block below.
#   4. wrangler d1 migrations apply widgetly-stage --remote --env stage
#   5. wrangler deploy --env stage
#   6. In the Cloudflare dashboard, attach stage.widgetly.tech to the
#      `widgetly-stage` Worker.
# ===========================================================================
[env.stage]
name = "widgetly-stage"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Stage KV namespace (replace the IDs with the real ones from
# `wrangler kv namespace create NEXT_INC_CACHE_KV --env stage`).
[[env.stage.kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "17fad7e0b36f41759772bc20435e9d32"
preview_id = "ff4d76208cae48e89be57ebd0073b4b2"

# Stage D1 database (replace the ID with the real one from
# `wrangler d1 create widgetly-stage`).
[[env.stage.d1_databases]]
binding = "DB"
database_name = "widgetly-stage"
database_id = "49f407a7-a82d-48bf-9db3-88e651bb4966"
