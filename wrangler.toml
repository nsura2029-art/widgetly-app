name = "widgetly"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# ---------------------------------------------------------------------------
# Cloudflare Workers configuration (OpenNext adapter)
# ---------------------------------------------------------------------------
# `pnpm build` produces .open-next/ via @opennextjs/cloudflare. `pnpm deploy`
# invokes `opennextjs-cloudflare build && wrangler deploy` to ship the worker.
# Production domains are attached in the Cloudflare dashboard so CI deploys
# only update Worker code and assets, not route/custom-domain triggers.
# ---------------------------------------------------------------------------

# Optional KV (e.g. waitlist persistence)
# [[kv_namespaces]]
# binding = "WAITLIST"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"
# preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# KV: user locale preference (set by POST /api/locale, read by the middleware
# via the wly_locale cookie). Anonymous identity is the key.
#
# Created via:
#   pnpm wrangler kv:namespace create LOCALE_KV
#   pnpm wrangler kv:namespace create LOCALE_KV --preview
# Paste the printed IDs into `id` / `preview_id` below.
# ---------------------------------------------------------------------------
# [[kv_namespaces]]
# binding = "LOCALE_KV"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"
# preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# Environment variables (set in Cloudflare dashboard, not here)
# ---------------------------------------------------------------------------
# WAITLIST_KV      — KV binding (if KV enabled)
# LOCALE_KV        — KV binding (locale preference persistence)
# ANALYTICS_TOKEN  — Cloudflare Web Analytics token (set in dashboard)
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# D1: waitlist + tool suggestions persistence.
#
# Replaces the previous Supabase integration. D1 lives inside Cloudflare's
# edge network, so writes are 5-20ms vs the 100-300ms round-trip to
# Supabase we had before.
#
# Setup (one-time, on your local machine):
#   1. pnpm exec wrangler d1 create widgetly
#      → prints a database_id; paste it below.
#   2. pnpm db:migrate:remote
#      → applies migrations/0001_init.sql to the deployed D1.
#
# Migrations are SQL files in /migrations. Add a new NNNN_*.sql file and
# run `pnpm db:migrate:remote` to apply. Never edit applied migrations.
#
# The binding `DB` is what the code reads via (globalThis as { DB?: D1Database }).DB.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "widgetly"
database_id = "64cbb0d4-af76-46cf-a742-cf78902f1dc3"
