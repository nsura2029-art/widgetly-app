name = "widgetly"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Static assets — long-lived caching with content-hash filenames
[build]
command = "npm run build"

# ---------------------------------------------------------------------------
# Cloudflare Pages configuration
# ---------------------------------------------------------------------------
# This file is consumed by `wrangler pages deploy`. The Next.js build emits
# a fully static site to .vercel/output/static (see `output: "export"` in
# next.config.ts) so we don't need a Workers bundle — Pages serves the
# static output directly from its CDN.
#
# To add dynamic functionality (e.g. persisting waitlist signups), uncomment
# the KV namespace below and wire it up in /src/app/api/waitlist/route.ts.
# ---------------------------------------------------------------------------

# [[kv_namespaces]]
# binding = "WAITLIST"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"
# preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# Environment variables (set in Cloudflare Pages dashboard, not here)
# ---------------------------------------------------------------------------
# WAITLIST_KV      — KV binding (if KV enabled)
# ANALYTICS_TOKEN  — Cloudflare Web Analytics token (set in dashboard)
# ---------------------------------------------------------------------------

[observability]
enabled = true
