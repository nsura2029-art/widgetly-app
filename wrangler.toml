name = "widgetly"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# ---------------------------------------------------------------------------
# Cloudflare Workers configuration (OpenNext adapter)
# ---------------------------------------------------------------------------
# `pnpm build` produces .open-next/ via @opennextjs/cloudflare. `pnpm deploy`
# invokes `opennextjs-cloudflare build && wrangler deploy` to ship the worker.
# Production domains are attached in the Cloudflare dashboard so CI deploys
# only update Worker code and assets, not route/custom-domain triggers.
# ---------------------------------------------------------------------------
#
# Two environments:
#   - (default) production → widgetly.tech        (Worker name: widgetly)
#   - stage              → stage.widgetly.tech    (Worker name: widgetly-stage)
#
# Per-environment bindings (D1, KV) keep the two stacks fully isolated:
# dropping or migrating the stage database doesn't affect production.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Production KV (OpenNext incremental cache).
#
# Backing store for prerendered HTML pages (`force-static` routes). Without
# this, OpenNext re-renders every request — the previous `incrementalCache:
# "dummy"` config in open-next.config.ts caused the Worker to spin on every
# request, which is what was triggering the random Error 1102s.
#
# KV is included in Workers Free (100K reads/day, 1K writes/day, 1 GB). Reads
# happen on every cached request; writes happen at build time when OpenNext
# prerenders each route. We use <0.1% of the daily quota.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "0e35b410aaf04be18d7cb17e54bc9cfb"
preview_id = "d85f0da78ed64650a9502783e03f116f"

# ---------------------------------------------------------------------------
# Production D1: waitlist + tool suggestions + leaderboard + admin.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "widgetly"
database_id = "64cbb0d4-af76-46cf-a742-cf78902f1dc3"

# ===========================================================================
# STAGE ENVIRONMENT
# ---------------------------------------------------------------------------
# A completely separate Worker + D1 + KV. Reachable at stage.widgetly.tech.
# CI deploys push-to-develop here; production deploys push-to-main.
#
# Setup (one-time, on your local machine):
#   1. wrangler kv namespace create NEXT_INC_CACHE_KV --env stage
#   2. wrangler d1 create widgetly-stage
#   3. Paste the printed IDs into the [env.stage] block below.
#   4. wrangler d1 migrations apply widgetly-stage --remote --env stage
#   5. wrangler deploy --env stage
#   6. In the Cloudflare dashboard, attach stage.widgetly.tech to the
#      `widgetly-stage` Worker.
# ===========================================================================
[env.stage]
name = "widgetly-stage"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Stage KV namespace (placeholder IDs — replace after running the
# `wrangler kv namespace create` commands in the setup notes above).
[[env.stage.kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "REPLACE_WITH_STAGE_KV_ID"
preview_id = "REPLACE_WITH_STAGE_KV_PREVIEW_ID"

# Stage D1 database (placeholder ID — replace after `wrangler d1 create`).
[[env.stage.d1_databases]]
binding = "DB"
database_name = "widgetly-stage"
database_id = "REPLACE_WITH_STAGE_D1_ID"

# Stage secrets go in:
#   wrangler secret put ADMIN_SESSION_SECRET --env stage
#   wrangler secret put SUGGEST_WEBHOOK_URL --env stage
# (everything that's set on the production Worker; use the same values
# for stage EXCEPT for any production-only credentials.)
