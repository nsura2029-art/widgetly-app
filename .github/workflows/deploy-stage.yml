name: Deploy to Stage (Cloudflare Workers)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: stage-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to beta.widgetly.tech
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: stage
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -------------------------------------------------------------------
      # Sync the same set of secrets we push to production, but to the
      # `stage` wrangler environment. This keeps the two stacks in lockstep
      # so staging is a faithful preview of what'll hit production.
      #
      # Note: ADMIN_SESSION_SECRET should be different on stage so a token
      # minted in one environment doesn't accidentally work in the other.
      # -------------------------------------------------------------------
      - name: Sync secrets to stage Worker
        if: ${{ env.SUPABASE_URL != '' || env.SUPABASE_SERVICE_ROLE_KEY != '' || env.WAITLIST_WEBHOOK_URL != '' || env.SUGGEST_WEBHOOK_URL != '' || env.NEXT_PUBLIC_ANALYTICS_TOKEN != '' || env.ADMIN_SESSION_SECRET != '' || env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' || env.CLERK_SECRET_KEY != '' }}
        run: |
          set -e
          echo "secrets present in this run:"
          for n in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY WAITLIST_WEBHOOK_URL SUGGEST_WEBHOOK_URL NEXT_PUBLIC_ANALYTICS_TOKEN ADMIN_SESSION_SECRET NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY CLERK_SECRET_KEY; do
            v=$(eval echo "\$$n")
            if [ -n "$v" ]; then echo "  $n: set (length ${#v})"; else echo "  $n: (not set, skipping)"; fi
          done
          [ -n "$SUPABASE_URL" ]              && printf '%s' "$SUPABASE_URL"              | pnpm exec wrangler secret put SUPABASE_URL              --env stage || true
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | pnpm exec wrangler secret put SUPABASE_SERVICE_ROLE_KEY --env stage || true
          [ -n "$WAITLIST_WEBHOOK_URL" ]      && printf '%s' "$WAITLIST_WEBHOOK_URL"      | pnpm exec wrangler secret put WAITLIST_WEBHOOK_URL      --env stage || true
          [ -n "$SUGGEST_WEBHOOK_URL" ]       && printf '%s' "$SUGGEST_WEBHOOK_URL"       | pnpm exec wrangler secret put SUGGEST_WEBHOOK_URL       --env stage || true
          [ -n "$NEXT_PUBLIC_ANALYTICS_TOKEN" ] && printf '%s' "$NEXT_PUBLIC_ANALYTICS_TOKEN" | pnpm exec wrangler secret put NEXT_PUBLIC_ANALYTICS_TOKEN --env stage || true
          [ -n "$ADMIN_SESSION_SECRET" ]      && printf '%s' "$ADMIN_SESSION_SECRET"      | pnpm exec wrangler secret put ADMIN_SESSION_SECRET      --env stage || true
          [ -n "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ] && printf '%s' "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" | pnpm exec wrangler secret put NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY --env stage || true
          [ -n "$CLERK_SECRET_KEY" ]              && printf '%s' "$CLERK_SECRET_KEY"              | pnpm exec wrangler secret put CLERK_SECRET_KEY              --env stage || true
          echo "stage secrets sync complete"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WAITLIST_WEBHOOK_URL: ${{ secrets.WAITLIST_WEBHOOK_URL }}
          SUGGEST_WEBHOOK_URL: ${{ secrets.SUGGEST_WEBHOOK_URL }}
          NEXT_PUBLIC_ANALYTICS_TOKEN: ${{ secrets.NEXT_PUBLIC_ANALYTICS_TOKEN }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      # Apply any pending D1 migrations BEFORE deploying so the new
      # Worker code finds the new tables on its first request.
      - name: Apply D1 migrations (stage)
        run: pnpm exec wrangler d1 migrations apply widgetly-stage --remote --env stage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to stage
        # opennextjs-cloudflare build produces .open-next/worker.js; then
        # wrangler deploy --env stage picks up the [env.stage] bindings
        # from wrangler.toml. Mirrors pnpm deploy but for stage.
        run: pnpm exec opennextjs-cloudflare build && pnpm exec wrangler deploy --env stage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Clerk env vars MUST be present at build time so the
          # @clerk/nextjs components resolve to the right publishable
          # key. The Clerk auth wrappers in src/components/auth/ check
          # NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY at build time to decide
          # whether to render Clerk's <SignInButton> or fall back to
          # a plain <Link>.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          OPEN_NEXT_DEPLOY: "true"
          NEXT_TELEMETRY_DISABLED: 1

      - name: Warm stage KV cache
        if: success()
        run: bash scripts/warm-cache.sh https://beta.widgetly.tech
        env:
          WARM_LOCALES: "en"

      # ---------------------------------------------------------------------------
      # Post-deploy smoke test on stage. We hit the workers.dev URL
      # (https://widgetly-stage.<account-subdomain>.workers.dev) instead
      # of beta.widgetly.tech for two reasons:
      #   1. The custom domain may not be wired up yet — by default the
      #      domain is a Cloudflare "Workers Free" placeholder that
      #      returns 200 for everything, which would falsely pass the
      #      smoke test.
      #   2. The workers.dev URL is the one Cloudflare guarantees is
      #      bound to the deployed Worker, no DNS dance required.
      #
      # Once the user wires beta.widgetly.tech to the widgetly-stage
      # Worker in the Cloudflare dashboard, switch STAGE_URL to the
      # custom domain in the env block below.
      # ---------------------------------------------------------------------------
      - name: Smoke test stage
        if: success()
        run: bash scripts/smoke-test.sh "${{ vars.STAGE_URL || 'https://widgetly-stage.nsura2029.workers.dev' }}"
        env:
          STAGE_URL: ${{ vars.STAGE_URL || 'https://widgetly-stage.nsura2029.workers.dev' }}
