name: Set stage Clerk secrets (one-time / rotate)

on:
  workflow_dispatch:

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile

      - name: Set stage Clerk secrets from GH secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          set -e

          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "::error::NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is empty in GitHub Actions secrets."
            echo "Get one at https://dashboard.clerk.com → API Keys (looks like pk_test_...)."
            echo "Then set it at: https://github.com/nsura2029-art/widgetly-app/settings/secrets/actions"
            exit 1
          fi

          if [ -z "$CLERK_SECRET_KEY" ]; then
            echo "::error::CLERK_SECRET_KEY is empty in GitHub Actions secrets."
            echo "Get one at https://dashboard.clerk.com → API Keys (looks like sk_test_...)."
            echo "Then set it at: https://github.com/nsura2029-art/widgetly-app/settings/secrets/actions"
            exit 1
          fi

          echo "Setting NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY (length=${#NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY})"
          printf '%s' "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" | pnpm exec wrangler secret put NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY --env stage
          echo "Setting CLERK_SECRET_KEY (length=${#CLERK_SECRET_KEY})"
          printf '%s' "$CLERK_SECRET_KEY" | pnpm exec wrangler secret put CLERK_SECRET_KEY --env stage
          echo "Done."

      - name: Verify they landed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Stage Worker secret list ==="
          pnpm exec wrangler secret list --env stage 2>&1
