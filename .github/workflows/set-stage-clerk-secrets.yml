name: Set stage Clerk secrets (one-time)

# One-shot workflow to set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY and
# CLERK_SECRET_KEY on the stage Worker.
#
# Get the keys from https://dashboard.clerk.com → API Keys.
# Both are required; NEXT_PUBLIC_* is safe to commit (it's a
# publishable key, not a secret), CLERK_SECRET_KEY is the actual
# secret and must stay server-side.
#
# Trigger from the Actions tab:
#   1. https://github.com/nsura2029-art/widgetly-app/actions/workflows/set-stage-clerk-secrets.yml
#   2. Click "Run workflow"
#   3. Paste both keys in the inputs
#   4. Click "Run workflow"
#
# Idempotent — wrangler secret put overwrites the existing value.

on:
  workflow_dispatch:
    inputs:
      publishable_key:
        description: "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY (publishable key from Clerk dashboard)"
        required: true
        type: string
      secret_key:
        description: "CLERK_SECRET_KEY (secret key — will be masked in logs)"
        required: true
        type: string

jobs:
  set-secrets:
    name: Set Clerk secrets on stage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: stage

    steps:
      - name: Mask the keys in logs
        run: |
          echo "::add-mask::${{ inputs.publishable_key }}"
          echo "::add-mask::${{ inputs.secret_key }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies (for wrangler)
        run: pnpm install --frozen-lockfile

      - name: Set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KEY: ${{ inputs.publishable_key }}
        run: |
          printf '%s' "$KEY" | pnpm exec wrangler secret put NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY --env stage

      - name: Set CLERK_SECRET_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KEY: ${{ inputs.secret_key }}
        run: |
          printf '%s' "$KEY" | pnpm exec wrangler secret put CLERK_SECRET_KEY --env stage

      - name: Verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler secret list --env stage 2>&1 | grep -E "CLERK" || echo "WARN: CLERK keys not visible in secret list (this is normal — list is names-only)"