name: Seed admin subcategory (stage)

# One-shot workflow to backfill the `subcategory` column on
# widgetly-stage's admin_tools table. Reads tools-subgroups.ts from
# the repo and UPDATEs every (category, slug) row with the canonical
# subgroup title.
#
# Idempotent — re-running is safe. Safe to run after a fresh
# seed-admin.mjs (which leaves every row at subcategory='Other')
# or after any admin hand-adds.
#
# Trigger from the Actions tab:
#   1. https://github.com/nsura2029-art/widgetly-app/actions/workflows/seed-admin-subcategory-stage.yml
#   2. Click "Run workflow"
#   3. (No inputs required.)
#
# Verification step confirms the backfill landed — counts per
# category should match tools-subgroups.ts for the static-catalog
# tools, and any admin hand-adds end up at the category-name
# fallback (e.g. "PDF" for an ungrouped pdf tool).

on:
  workflow_dispatch:

jobs:
  seed:
    name: Backfill subcategory on stage admin_tools
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: stage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm (version from packageManager field)
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run subcategory backfill on widgetly-stage
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/seed-admin-subcategory.mjs --remote --env stage

      - name: Verify subcategory distribution
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler d1 execute widgetly-stage --env stage --remote \
            --command "SELECT category, subcategory, COUNT(*) AS n FROM admin_tools WHERE status='live' GROUP BY category, subcategory ORDER BY category, subcategory;"

      - name: Done
        run: |
          echo "✓ Subcategory backfill complete on widgetly-stage."
          echo "→ Hover any chip at https://beta.widgetly.tech/en to see the new menu structure."