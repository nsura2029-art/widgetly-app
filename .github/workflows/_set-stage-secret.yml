name: Set stage ADMIN_SESSION_SECRET (one-time)

on:
  workflow_dispatch:

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Set stage ADMIN_SESSION_SECRET from GH secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
        run: |
          if [ -z "$ADMIN_SESSION_SECRET" ]; then
            echo "::error::ADMIN_SESSION_SECRET is empty in GitHub Actions secrets."
            echo "Please set it at: https://github.com/nsura2029-art/widgetly-app/settings/secrets/actions"
            exit 1
          fi
          echo "Setting ADMIN_SESSION_SECRET on stage Worker (length=${#ADMIN_SESSION_SECRET})"
          printf '%s' "$ADMIN_SESSION_SECRET" | pnpm exec wrangler secret put ADMIN_SESSION_SECRET --env stage
          echo "Done."
      - name: Verify it landed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Stage Worker secret list ==="
          pnpm exec wrangler secret list --env stage 2>&1
