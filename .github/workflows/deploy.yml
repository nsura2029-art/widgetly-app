name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---------------------------------------------------------------------------
      # Sync secrets from GitHub Actions secrets → Cloudflare Worker secrets.
      # This is a no-op for any GH secret that's not set, so it's safe to keep
      # running on every deploy. If you add a new secret (e.g. WAITLIST_WEBHOOK_URL)
      # to GH secrets, it'll get pushed to Cloudflare on the next push to main.
      #
      # Mirror of `scripts/setup-cloudflare-secrets.mjs` — kept inline here so
      # the deploy workflow has no dependency on a local script file.
      # ---------------------------------------------------------------------------
      - name: Sync Supabase + webhook secrets to Cloudflare Worker
        if: ${{ secrets.SUPABASE_URL != '' || secrets.SUPABASE_SERVICE_ROLE_KEY != '' || secrets.WAITLIST_WEBHOOK_URL != '' || secrets.SUGGEST_WEBHOOK_URL != '' || secrets.NEXT_PUBLIC_ANALYTICS_TOKEN != '' }}
        run: |
          set -e
          # Install wrangler CLI in this step (it's a devDep already, but
          # making it explicit avoids surprises if the workflow runner's
          # pnpm layout changes).
          pnpm exec wrangler --version
          [ -n "$SUPABASE_URL" ]              && echo "$SUPABASE_URL"              | pnpm exec wrangler secret put SUPABASE_URL              || true
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "$SUPABASE_SERVICE_ROLE_KEY" | pnpm exec wrangler secret put SUPABASE_SERVICE_ROLE_KEY || true
          [ -n "$WAITLIST_WEBHOOK_URL" ]      && echo "$WAITLIST_WEBHOOK_URL"      | pnpm exec wrangler secret put WAITLIST_WEBHOOK_URL      || true
          [ -n "$SUGGEST_WEBHOOK_URL" ]       && echo "$SUGGEST_WEBHOOK_URL"       | pnpm exec wrangler secret put SUGGEST_WEBHOOK_URL       || true
          [ -n "$NEXT_PUBLIC_ANALYTICS_TOKEN" ] && echo "$NEXT_PUBLIC_ANALYTICS_TOKEN" | pnpm exec wrangler secret put NEXT_PUBLIC_ANALYTICS_TOKEN || true
          echo "secrets sync complete"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WAITLIST_WEBHOOK_URL: ${{ secrets.WAITLIST_WEBHOOK_URL }}
          SUGGEST_WEBHOOK_URL: ${{ secrets.SUGGEST_WEBHOOK_URL }}
          NEXT_PUBLIC_ANALYTICS_TOKEN: ${{ secrets.NEXT_PUBLIC_ANALYTICS_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_TELEMETRY_DISABLED: 1
