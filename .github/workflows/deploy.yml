name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---------------------------------------------------------------------------
      # Sync secrets from GitHub Actions secrets → Cloudflare Worker secrets.
      # This is a no-op for any GH secret that's not set, so it's safe to keep
      # running on every deploy. If you add a new secret (e.g. WAITLIST_WEBHOOK_URL)
      # to GH secrets, it'll get pushed to Cloudflare on the next push to main.
      #
      # The `if` references env vars (not `secrets.X` directly) because GitHub
      # Actions forbids the secrets context inside `if:` expressions — it's an
      # anti-exfiltration guard. Empty/unset GH secrets become empty env vars
      # in the runner, which is what we want to detect.
      #
      # Mirror of `scripts/setup-cloudflare-secrets.mjs` — kept inline here so
      # the deploy workflow has no dependency on a local script file.
      # ---------------------------------------------------------------------------
      - name: Sync Supabase + webhook secrets to Cloudflare Worker
        if: ${{ env.SUPABASE_URL != '' || env.SUPABASE_SERVICE_ROLE_KEY != '' || env.WAITLIST_WEBHOOK_URL != '' || env.SUGGEST_WEBHOOK_URL != '' || env.NEXT_PUBLIC_ANALYTICS_TOKEN != '' }}
        run: |
          set -e
          # Explicit verbose log so the CI output makes it obvious which
          # secrets are present (and which were skipped because the GH
          # secret wasn't set). Empty values are skipped below.
          echo "secrets present in this run:"
          for n in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY WAITLIST_WEBHOOK_URL SUGGEST_WEBHOOK_URL NEXT_PUBLIC_ANALYTICS_TOKEN; do
            v=$(eval echo "\$$n")
            if [ -n "$v" ]; then echo "  $n: set (length ${#v})"; else echo "  $n: (not set, skipping)"; fi
          done
          # Use stdin pipe — wrangler 4.100.0 reads the secret value from
          # stdin when stdin isn't a TTY (we're in CI, so it's not).
          # Don't use --text: it doesn't exist on this wrangler version.
          # If you upgrade wrangler later and want to switch to --text for
          # robustness against shell quote edge cases, also update
          # scripts/setup-cloudflare-secrets.mjs to match.
          [ -n "$SUPABASE_URL" ]              && printf '%s' "$SUPABASE_URL"              | pnpm exec wrangler secret put SUPABASE_URL              || true
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | pnpm exec wrangler secret put SUPABASE_SERVICE_ROLE_KEY || true
          [ -n "$WAITLIST_WEBHOOK_URL" ]      && printf '%s' "$WAITLIST_WEBHOOK_URL"      | pnpm exec wrangler secret put WAITLIST_WEBHOOK_URL      || true
          [ -n "$SUGGEST_WEBHOOK_URL" ]       && printf '%s' "$SUGGEST_WEBHOOK_URL"       | pnpm exec wrangler secret put SUGGEST_WEBHOOK_URL       || true
          [ -n "$NEXT_PUBLIC_ANALYTICS_TOKEN" ] && printf '%s' "$NEXT_PUBLIC_ANALYTICS_TOKEN" | pnpm exec wrangler secret put NEXT_PUBLIC_ANALYTICS_TOKEN || true
          echo "secrets sync complete"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WAITLIST_WEBHOOK_URL: ${{ secrets.WAITLIST_WEBHOOK_URL }}
          SUGGEST_WEBHOOK_URL: ${{ secrets.SUGGEST_WEBHOOK_URL }}
          NEXT_PUBLIC_ANALYTICS_TOKEN: ${{ secrets.NEXT_PUBLIC_ANALYTICS_TOKEN }}

      # ---------------------------------------------------------------------------
      # Apply any pending D1 migrations BEFORE deploying the new code.
      # `wrangler d1 migrations apply` is idempotent — it tracks applied
      # migrations in the `d1_migrations` table and only runs new ones.
      #
      # Doing this before the deploy (not after) means the new Worker
      # code finds the new tables on its first request. If we ran the
      # migration after, the new code would land first and every D1
      # call to a not-yet-existent table would silently fail (via
      # safeQuery) until the migration step ran a few seconds later.
      # ---------------------------------------------------------------------------
      - name: Apply D1 migrations
        run: pnpm db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_TELEMETRY_DISABLED: 1

      # ---------------------------------------------------------------------------
      # Warm the OpenNext KV cache so the first real user to hit each route
      # doesn't pay the cold-render cost (~150-700 ms). With the deploy
      # skipping the OpenNext bulk-populate step (we set OPEN_NEXT_DEPLOY=true
      # to avoid the Workers Free per-day limit on KV bulk writes), the
      # cache is populated lazily on first request — this script does that
      # lazy population proactively.
      #
      # Side effects: ~500 GETs to widgetly.tech, ~500 KV writes (well under
      # the 1,000/day Workers Free limit). Runs only on production deploys.
      # ---------------------------------------------------------------------------
      - name: Warm KV cache
        if: success() && github.ref == 'refs/heads/main'
        run: bash scripts/warm-cache.sh https://widgetly.tech
        env:
          WARM_LOCALES: "en"

      # ---------------------------------------------------------------------------
      # Post-deploy smoke test. Catches the case where the build + deploy
      # succeeded but the live Worker is broken (e.g. a missing env var, a
      # D1 query hitting "no such table", an HTML route returning 500).
      # The smoke test hits 12 key URLs across public + admin + API; a single
      # failure fails the job, which blocks the develop→main release PR
      # (via required-checks branch protection).
      # ---------------------------------------------------------------------------
      - name: Smoke test the live site
        if: success() && github.ref == 'refs/heads/main'
        run: bash scripts/smoke-test.sh https://widgetly.tech
