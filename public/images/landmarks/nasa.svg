<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="NASA Rocket Launch">
  <defs>
    <linearGradient id="nasa-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="nasa-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="60%" stop-color="#5B6CFF"/>
      <stop offset="100%" stop-color="#EEF0FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#nasa-sky)"/>
  <!-- stars -->
  <g fill="#FFFFFF">
    <circle cx="30" cy="30" r="1"/>
    <circle cx="50" cy="50" r=".8"/>
    <circle cx="170" cy="35" r="1.2"/>
    <circle cx="155" cy="65" r=".8"/>
    <circle cx="25" cy="80" r="1"/>
    <circle cx="180" cy="100" r=".8"/>
    <circle cx="40" cy="115" r=".7"/>
    <circle cx="160" cy="130" r="1"/>
  </g>
  <!-- planet / moon -->
  <circle cx="160" cy="55" r="14" fill="#7B61FF" opacity=".35"/>
  <circle cx="160" cy="55" r="14" fill="none" stroke="#A855F7" stroke-width="1" opacity=".6"/>
  <circle cx="156" cy="51" r="2" fill="#FFFFFF" opacity=".4"/>
  <circle cx="163" cy="58" r="1.5" fill="#FFFFFF" opacity=".3"/>
  <!-- launch pad -->
  <rect x="75" y="170" width="50" height="8" fill="#5B6CFF" opacity=".6" rx="1"/>
  <rect x="85" y="178" width="6" height="6" fill="#7B61FF" opacity=".6"/>
  <rect x="109" y="178" width="6" height="6" fill="#7B61FF" opacity=".6"/>
  <!-- rocket body -->
  <path d="M100 50 L88 90 L88 165 L112 165 L112 90 Z" fill="#FFFFFF"/>
  <!-- rocket tip -->
  <path d="M100 50 L88 90 L112 90 Z" fill="#A855F7"/>
  <!-- window -->
  <circle cx="100" cy="110" r="7" fill="#5B6CFF"/>
  <circle cx="100" cy="110" r="4" fill="#EEF0FF"/>
  <!-- side fins -->
  <path d="M88 140 L72 160 L72 165 L88 165 Z" fill="#7B61FF"/>
  <path d="M112 140 L128 160 L128 165 L112 165 Z" fill="#7B61FF"/>
  <!-- body stripe -->
  <rect x="88" y="135" width="24" height="3" fill="#5B6CFF"/>
  <!-- flames -->
  <path d="M92 165 L100 195 L108 165 Z" fill="url(#nasa-flame)"/>
  <path d="M95 165 L100 185 L105 165 Z" fill="#FFFFFF" opacity=".7"/>
  <!-- NASA-style text mark -->
  <text x="100" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="2">NASA</text>
</svg>
