<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Mount Rushmore">
  <defs>
    <linearGradient id="mr-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="100%" stop-color="#EEF0FF"/>
    </linearGradient>
    <linearGradient id="mr-mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#5B6CFF"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#mr-sky)"/>
  <!-- sun -->
  <circle cx="155" cy="40" r="10" fill="#A855F7" opacity=".4"/>
  <!-- distant mountain -->
  <path d="M0 130 L30 105 L60 120 L100 100 L140 115 L180 105 L200 115 L200 200 L0 200 Z" fill="url(#mr-mountain)" opacity=".4"/>
  <!-- main mountain (Rushmore) -->
  <path d="M10 175 L30 145 L50 160 L70 130 L100 115 L130 130 L155 150 L175 145 L195 175 L195 200 L10 200 Z" fill="url(#mr-mountain)"/>
  <!-- carved faces (4 presidents) -->
  <g fill="#EEF0FF" opacity=".95">
    <!-- Washington (left) -->
    <ellipse cx="38" cy="118" rx="8" ry="11"/>
    <rect x="33" y="100" width="10" height="6" rx="1"/>
    <!-- Jefferson -->
    <ellipse cx="62" cy="115" rx="8" ry="11"/>
    <path d="M55 100 Q62 95 69 100 L69 108 L55 108 Z"/>
    <!-- Roosevelt (center, bigger) -->
    <ellipse cx="92" cy="108" rx="10" ry="13"/>
    <rect x="84" y="86" width="16" height="6" rx="2"/>
    <rect x="86" y="92" width="12" height="3" rx="1"/>
    <!-- Lincoln (right) -->
    <ellipse cx="122" cy="115" rx="9" ry="12"/>
    <path d="M115 100 L115 96 Q122 90 129 96 L129 100 Z"/>
    <rect x="115" y="108" width="14" height="4" rx="1"/>
  </g>
  <!-- face shadows -->
  <g fill="#7B61FF" opacity=".35">
    <ellipse cx="38" cy="121" rx="6" ry="3"/>
    <ellipse cx="62" cy="118" rx="6" ry="3"/>
    <ellipse cx="92" cy="113" rx="7" ry="4"/>
    <ellipse cx="122" cy="119" rx="6" ry="3"/>
  </g>
  <!-- eyes -->
  <g fill="#5B6CFF">
    <circle cx="35" cy="115" r="1"/>
    <circle cx="41" cy="115" r="1"/>
    <circle cx="59" cy="112" r="1"/>
    <circle cx="65" cy="112" r="1"/>
    <circle cx="88" cy="104" r="1"/>
    <circle cx="96" cy="104" r="1"/>
    <circle cx="119" cy="112" r="1"/>
    <circle cx="125" cy="112" r="1"/>
  </g>
  <!-- mountain shadow lines -->
  <g stroke="#5B6CFF" stroke-width=".8" opacity=".4" fill="none">
    <line x1="20" y1="160" x2="25" y2="175"/>
    <line x1="50" y1="155" x2="55" y2="170"/>
    <line x1="110" y1="145" x2="115" y2="165"/>
    <line x1="155" y1="160" x2="160" y2="175"/>
    <line x1="180" y1="170" x2="185" y2="185"/>
  </g>
  <!-- flag on top -->
  <line x1="92" y1="86" x2="92" y2="70" stroke="#5B6CFF" stroke-width="1.2"/>
  <rect x="92" y="70" width="10" height="6" fill="#A855F7"/>
  <!-- trees / pine silhouettes at base -->
  <g fill="#5B6CFF" opacity=".7">
    <polygon points="15,180 20,170 25,180"/>
    <polygon points="180,180 185,170 190,180"/>
    <polygon points="10,185 16,172 22,185"/>
  </g>
  <!-- ground -->
  <rect x="0" y="190" width="200" height="10" fill="#5B6CFF" opacity=".4"/>
  <!-- bird -->
  <g fill="none" stroke="#5B6CFF" stroke-width="1.2" stroke-linecap="round">
    <path d="M40 35 Q44 31 48 35 Q52 31 56 35"/>
  </g>
</svg>
