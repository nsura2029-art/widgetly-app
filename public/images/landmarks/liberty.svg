<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Statue of Liberty">
  <defs>
    <linearGradient id="lib-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF0FF"/>
      <stop offset="100%" stop-color="#DDE1FF"/>
    </linearGradient>
    <linearGradient id="lib-statue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B6CFF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#lib-sky)"/>
  <!-- sun glow -->
  <circle cx="100" cy="80" r="50" fill="#A855F7" opacity=".1"/>
  <!-- pedestal -->
  <rect x="78" y="155" width="44" height="25" fill="#7B61FF" opacity=".5"/>
  <rect x="74" y="180" width="52" height="6" fill="#5B6CFF" opacity=".6" rx="1"/>
  <!-- robe body -->
  <path d="M85 155 L82 110 Q100 105 118 110 L115 155 Z" fill="url(#lib-statue)"/>
  <!-- robe folds -->
  <g stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" opacity=".4">
    <line x1="92" y1="120" x2="92" y2="150"/>
    <line x1="100" y1="118" x2="100" y2="152"/>
    <line x1="108" y1="120" x2="108" y2="150"/>
  </g>
  <!-- left arm holding tablet -->
  <rect x="74" y="125" width="10" height="22" fill="url(#lib-statue)" rx="1"/>
  <rect x="68" y="138" width="14" height="18" fill="#5B6CFF" rx="1"/>
  <line x1="71" y1="143" x2="79" y2="143" stroke="#FFFFFF" stroke-width=".7" opacity=".6"/>
  <line x1="71" y1="148" x2="79" y2="148" stroke="#FFFFFF" stroke-width=".7" opacity=".6"/>
  <!-- right arm raised -->
  <path d="M118 112 L130 70" stroke="url(#lib-statue)" stroke-width="6" stroke-linecap="round"/>
  <!-- torch -->
  <rect x="126" y="55" width="6" height="14" fill="#7B61FF" rx="1"/>
  <path d="M120 50 Q129 35 138 50 Q134 55 129 52 Q124 55 120 50 Z" fill="#A855F7"/>
  <path d="M124 45 Q129 32 134 45" fill="none" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity=".6"/>
  <!-- head -->
  <circle cx="100" cy="95" r="9" fill="url(#lib-statue)"/>
  <!-- crown spikes -->
  <g stroke="#5B6CFF" stroke-width="1.5" stroke-linecap="round">
    <line x1="92" y1="92" x2="89" y2="84"/>
    <line x1="96" y1="89" x2="94" y2="80"/>
    <line x1="100" y1="88" x2="100" y2="78"/>
    <line x1="104" y1="89" x2="106" y2="80"/>
    <line x1="108" y1="92" x2="111" y2="84"/>
  </g>
  <!-- face highlight -->
  <circle cx="97" cy="94" r="1" fill="#FFFFFF" opacity=".5"/>
  <circle cx="102" cy="94" r="1" fill="#FFFFFF" opacity=".5"/>
  <!-- water -->
  <path d="M0 186 Q40 182 80 186 T160 186 Q180 184 200 186 L200 200 L0 200 Z" fill="#5B6CFF" opacity=".4"/>
  <g stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" opacity=".5">
    <path d="M20 192 Q35 190 50 192" fill="none"/>
    <path d="M120 195 Q140 193 160 195" fill="none"/>
  </g>
</svg>
