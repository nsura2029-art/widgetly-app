<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Disneyland Castle">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF0FF"/>
      <stop offset="100%" stop-color="#DDE1FF"/>
    </linearGradient>
    <linearGradient id="castle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B6CFF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#sky)"/>
  <!-- back stars -->
  <circle cx="40" cy="40" r="1.5" fill="#A855F7" opacity=".6"/>
  <circle cx="160" cy="50" r="1.5" fill="#5B6CFF" opacity=".5"/>
  <circle cx="170" cy="30" r="1" fill="#7B61FF" opacity=".6"/>
  <!-- left turret -->
  <rect x="40" y="120" width="22" height="50" fill="url(#castle)"/>
  <polygon points="40,120 51,100 62,120" fill="#7B61FF"/>
  <rect x="46" y="135" width="10" height="14" fill="#EEF0FF" rx="1"/>
  <!-- right turret -->
  <rect x="138" y="120" width="22" height="50" fill="url(#castle)"/>
  <polygon points="138,120 149,100 160,120" fill="#7B61FF"/>
  <rect x="144" y="135" width="10" height="14" fill="#EEF0FF" rx="1"/>
  <!-- main keep -->
  <rect x="70" y="90" width="60" height="80" fill="url(#castle)"/>
  <polygon points="70,90 100,55 130,90" fill="#5B6CFF"/>
  <!-- main door -->
  <path d="M88 170 L88 145 Q88 132 100 132 Q112 132 112 145 L112 170 Z" fill="#EEF0FF"/>
  <!-- windows -->
  <rect x="80" y="110" width="8" height="12" fill="#EEF0FF" rx="1"/>
  <rect x="112" y="110" width="8" height="12" fill="#EEF0FF" rx="1"/>
  <!-- center spire -->
  <rect x="97" y="50" width="6" height="14" fill="#5B6CFF"/>
  <polygon points="95,50 100,38 105,50" fill="#A855F7"/>
  <!-- ground -->
  <rect x="0" y="170" width="200" height="30" fill="#A855F7" opacity=".15"/>
  <!-- fireworks -->
  <g stroke="#A855F7" stroke-width="1.2" stroke-linecap="round" opacity=".7">
    <line x1="30" y1="50" x2="30" y2="60"/>
    <line x1="25" y1="55" x2="35" y2="55"/>
    <line x1="26" y1="48" x2="34" y2="62"/>
    <line x1="34" y1="48" x2="26" y2="62"/>
  </g>
  <g stroke="#5B6CFF" stroke-width="1.2" stroke-linecap="round" opacity=".7">
    <line x1="170" y1="70" x2="170" y2="80"/>
    <line x1="165" y1="75" x2="175" y2="75"/>
    <line x1="166" y1="68" x2="174" y2="82"/>
    <line x1="174" y1="68" x2="166" y2="82"/>
  </g>
</svg>
