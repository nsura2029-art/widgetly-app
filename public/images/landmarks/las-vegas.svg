<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Las Vegas Strip">
  <defs>
    <linearGradient id="lv-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#5B6CFF" stop-opacity=".4"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#lv-sky)"/>
  <!-- stars -->
  <g fill="#FFFFFF">
    <circle cx="20" cy="20" r="1"/>
    <circle cx="60" cy="15" r=".8"/>
    <circle cx="100" cy="25" r="1"/>
    <circle cx="150" cy="18" r=".8"/>
    <circle cx="180" cy="30" r="1"/>
  </g>
  <!-- moon -->
  <circle cx="170" cy="40" r="10" fill="#EEF0FF" opacity=".9"/>
  <circle cx="166" cy="38" r="2" fill="#1E1B4B" opacity=".3"/>
  <circle cx="172" cy="44" r="1.5" fill="#1E1B4B" opacity=".3"/>
  <!-- distant buildings silhouette -->
  <g fill="#7B61FF" opacity=".5">
    <rect x="0" y="100" width="14" height="60"/>
    <rect x="14" y="90" width="10" height="70"/>
    <rect x="24" y="105" width="12" height="55"/>
  </g>
  <g fill="#7B61FF" opacity=".5">
    <rect x="186" y="95" width="14" height="65"/>
    <rect x="172" y="105" width="14" height="55"/>
  </g>
  <!-- Eiffel Tower replica (Paris LV) -->
  <g>
    <rect x="38" y="80" width="4" height="80" fill="#A855F7"/>
    <polygon points="40,80 28,160 52,160" fill="none" stroke="#A855F7" stroke-width="1.5"/>
    <line x1="34" y1="120" x2="46" y2="120" stroke="#A855F7" stroke-width="1"/>
    <line x1="32" y1="140" x2="48" y2="140" stroke="#A855F7" stroke-width="1"/>
    <polygon points="40,80 36,100 44,100" fill="#A855F7"/>
  </g>
  <!-- Pyramid (Luxor) -->
  <polygon points="70,160 95,90 120,160" fill="#7B61FF" opacity=".8"/>
  <polygon points="95,90 120,160 95,160" fill="#5B6CFF" opacity=".7"/>
  <line x1="95" y1="90" x2="95" y2="160" stroke="#FFFFFF" stroke-width=".5" opacity=".5"/>
  <!-- light beam from pyramid -->
  <polygon points="93,90 97,90 110,160 80,160" fill="#A855F7" opacity=".15"/>
  <!-- Sphere / globe -->
  <circle cx="145" cy="130" r="22" fill="#5B6CFF" opacity=".7"/>
  <circle cx="145" cy="130" r="22" fill="none" stroke="#A855F7" stroke-width="1.5"/>
  <g stroke="#A855F7" stroke-width=".8" fill="none" opacity=".6">
    <ellipse cx="145" cy="130" rx="22" ry="8"/>
    <line x1="123" y1="130" x2="167" y2="130"/>
  </g>
  <!-- sign marquee (neon strip below) -->
  <rect x="0" y="160" width="200" height="6" fill="#A855F7" opacity=".6"/>
  <g fill="#FFFFFF" opacity=".9">
    <circle cx="10" cy="163" r="1.5"/>
    <circle cx="30" cy="163" r="1.5"/>
    <circle cx="50" cy="163" r="1.5"/>
    <circle cx="70" cy="163" r="1.5"/>
    <circle cx="90" cy="163" r="1.5"/>
    <circle cx="110" cy="163" r="1.5"/>
    <circle cx="130" cy="163" r="1.5"/>
    <circle cx="150" cy="163" r="1.5"/>
    <circle cx="170" cy="163" r="1.5"/>
    <circle cx="190" cy="163" r="1.5"/>
  </g>
  <!-- ground -->
  <rect x="0" y="166" width="200" height="34" fill="#1E1B4B" opacity=".6"/>
  <!-- road dashes -->
  <g stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity=".7">
    <line x1="10" y1="185" x2="22" y2="185"/>
    <line x1="40" y1="185" x2="52" y2="185"/>
    <line x1="70" y1="185" x2="82" y2="185"/>
    <line x1="100" y1="185" x2="112" y2="185"/>
    <line x1="130" y1="185" x2="142" y2="185"/>
    <line x1="160" y1="185" x2="172" y2="185"/>
  </g>
  <!-- window lights -->
  <g fill="#EEF0FF" opacity=".9">
    <rect x="5" y="108" width="2" height="2"/>
    <rect x="9" y="115" width="2" height="2"/>
    <rect x="17" y="100" width="2" height="2"/>
    <rect x="190" y="110" width="2" height="2"/>
    <rect x="180" y="118" width="2" height="2"/>
  </g>
</svg>
