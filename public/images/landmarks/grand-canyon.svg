<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Grand Canyon">
  <defs>
    <linearGradient id="gc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="gc-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#5B6CFF"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#gc-sky)"/>
  <!-- sun -->
  <circle cx="155" cy="40" r="10" fill="#A855F7" opacity=".5"/>
  <!-- distant canyon plateaus (back) -->
  <path d="M0 80 L20 75 L35 82 L55 70 L75 78 L95 72 L120 80 L140 70 L160 78 L180 73 L200 80 L200 95 L0 95 Z" fill="#7B61FF" opacity=".25"/>
  <!-- middle layer -->
  <path d="M0 100 L25 95 L45 105 L70 92 L100 102 L130 95 L155 105 L180 98 L200 105 L200 125 L0 125 Z" fill="#7B61FF" opacity=".4"/>
  <!-- foreground rim -->
  <path d="M0 120 L15 115 L35 125 L60 112 L85 122 L110 115 L135 125 L160 115 L185 122 L200 118 L200 145 L0 145 Z" fill="url(#gc-rim)"/>
  <!-- cliff striations -->
  <g stroke="#FFFFFF" stroke-width=".8" stroke-linecap="round" opacity=".4">
    <line x1="20" y1="105" x2="20" y2="140"/>
    <line x1="50" y1="108" x2="50" y2="142"/>
    <line x1="80" y1="105" x2="80" y2="138"/>
    <line x1="115" y1="110" x2="115" y2="142"/>
    <line x1="145" y1="106" x2="145" y2="140"/>
    <line x1="175" y1="108" x2="175" y2="142"/>
  </g>
  <!-- deep canyon shadow -->
  <path d="M30 145 L60 150 L90 148 L120 152 L150 148 L180 150 L200 148 L200 200 L0 200 L0 150 Z" fill="#5B6CFF" opacity=".7"/>
  <!-- lower ridge highlights -->
  <path d="M0 175 Q40 170 80 175 T160 175 Q180 173 200 175 L200 200 L0 200 Z" fill="#7B61FF" opacity=".5"/>
  <!-- shadow rows for depth -->
  <g stroke="#FFFFFF" stroke-width=".6" opacity=".3">
    <line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="0" y1="170" x2="200" y2="170"/>
    <line x1="0" y1="185" x2="200" y2="185"/>
  </g>
  <!-- small bird -->
  <g fill="none" stroke="#5B6CFF" stroke-width="1.2" stroke-linecap="round">
    <path d="M40 45 Q44 41 48 45 Q52 41 56 45"/>
    <path d="M120 50 Q124 46 128 50 Q132 46 136 50"/>
  </g>
</svg>
