<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="White House">
  <defs>
    <linearGradient id="wh-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF0FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#wh-sky)"/>
  <!-- ground -->
  <rect x="0" y="170" width="200" height="30" fill="#A855F7" opacity=".2"/>
  <path d="M0 170 Q50 167 100 170 T200 170" fill="none" stroke="#7B61FF" stroke-width="1" opacity=".5"/>
  <!-- main building -->
  <rect x="30" y="100" width="140" height="70" fill="#FFFFFF" stroke="#5B6CFF" stroke-width="1.5"/>
  <!-- roof line -->
  <rect x="26" y="95" width="148" height="8" fill="#5B6CFF"/>
  <!-- portico columns -->
  <g fill="#5B6CFF">
    <rect x="86" y="108" width="4" height="50"/>
    <rect x="96" y="108" width="4" height="50"/>
    <rect x="106" y="108" width="4" height="50"/>
  </g>
  <!-- portico roof -->
  <polygon points="80,108 116,108 116,100 80,100" fill="#7B61FF"/>
  <polygon points="80,100 116,100 98,90" fill="#A855F7"/>
  <!-- windows -->
  <g fill="#DDE1FF" stroke="#5B6CFF" stroke-width="1">
    <rect x="40" y="115" width="14" height="18"/>
    <rect x="58" y="115" width="14" height="18"/>
    <rect x="76" y="115" width="10" height="18"/>
    <rect x="118" y="115" width="10" height="18"/>
    <rect x="132" y="115" width="14" height="18"/>
    <rect x="150" y="115" width="14" height="18"/>
  </g>
  <!-- window crosses -->
  <g stroke="#5B6CFF" stroke-width=".6" opacity=".5">
    <line x1="47" y1="115" x2="47" y2="133"/>
    <line x1="40" y1="124" x2="54" y2="124"/>
    <line x1="65" y1="115" x2="65" y2="133"/>
    <line x1="58" y1="124" x2="72" y2="124"/>
    <line x1="139" y1="115" x2="139" y2="133"/>
    <line x1="132" y1="124" x2="146" y2="124"/>
    <line x1="157" y1="115" x2="157" y2="133"/>
    <line x1="150" y1="124" x2="164" y2="124"/>
  </g>
  <!-- door -->
  <rect x="93" y="138" width="14" height="22" fill="#5B6CFF" rx="1"/>
  <circle cx="104" cy="150" r="1" fill="#EEF0FF"/>
  <!-- main door arch -->
  <path d="M91 138 Q100 130 109 138 L109 145 L91 145 Z" fill="#7B61FF" opacity=".5"/>
  <!-- flag pole -->
  <line x1="100" y1="90" x2="100" y2="70" stroke="#5B6CFF" stroke-width="1.2"/>
  <rect x="100" y="72" width="10" height="6" fill="#A855F7"/>
  <line x1="100" y1="74" x2="110" y2="74" stroke="#FFFFFF" stroke-width=".5" opacity=".6"/>
  <!-- lawn trees -->
  <g fill="#5B6CFF" opacity=".7">
    <circle cx="20" cy="165" r="6"/>
    <rect x="19" y="165" width="2" height="8" fill="#7B61FF"/>
    <circle cx="180" cy="165" r="6"/>
    <rect x="179" y="165" width="2" height="8" fill="#7B61FF"/>
  </g>
  <!-- sun -->
  <circle cx="30" cy="35" r="8" fill="#A855F7" opacity=".3"/>
  <circle cx="30" cy="35" r="4" fill="#A855F7" opacity=".5"/>
</svg>
