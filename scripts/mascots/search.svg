<?xml version="1.0" encoding="UTF-8"?>
<!--
  Reference animated mascot SVG for the Widgetly hero.
  Source-of-truth for the artwork. The React component at
  src/components/landing/animated-mascot/index.tsx renders an
  equivalent inline SVG with the same animation classes.

  This file is checked in only so the agent has a stable reference
  for the visual; it is not served from /public and can be deleted
  once the design is final.
-->
<svg
  viewBox="0 0 200 200"
  xmlns="http://www.w3.org/2000/svg"
  width="200"
  height="200"
>
  <defs>
    <linearGradient id="mascot-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B6CFF" />
      <stop offset="50%" stop-color="#7B61FF" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <linearGradient id="mascot-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B6CFF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="mascot-cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8FB1" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#FF8FB1" stop-opacity="0" />
    </radialGradient>

    <style>
      <![CDATA[
        .mascot-root      { transform-origin: 100px 100px; }
        .mascot-float     { animation: mascot-float 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
        .mascot-jump      { animation: mascot-jump 4.8s cubic-bezier(0.28,0.84,0.42,1) infinite; transform-box: fill-box; transform-origin: center; }
        .mascot-tilt      { animation: mascot-tilt 5.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
        .mascot-shadow    { transform-box: fill-box; transform-origin: center; animation: mascot-shadow 4.8s cubic-bezier(0.28,0.84,0.42,1) infinite; }
        .mascot-eyes      { transform-box: fill-box; transform-origin: center; animation: mascot-blink 5s ease-in-out infinite; }
        .mascot-mag       { transform-box: fill-box; transform-origin: 145px 70px; animation: mascot-mag 4s ease-in-out infinite; }
        .sparkle          { transform-box: fill-box; transform-origin: center; }
        .sparkle-a        { animation: mascot-twinkle 2.4s ease-in-out infinite; }
        .sparkle-b        { animation: mascot-twinkle 2.4s ease-in-out 0.8s infinite; }
        .sparkle-c        { animation: mascot-twinkle 2.4s ease-in-out 1.6s infinite; }

        @keyframes mascot-float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        @keyframes mascot-jump    { 0%,78%,100%{transform:translateY(0) scaleY(1)} 84%{transform:translateY(-14px) scaleY(1.04)} 92%{transform:translateY(0) scaleY(0.94)} 96%{transform:translateY(-3px) scaleY(1.02)} }
        @keyframes mascot-tilt    { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
        @keyframes mascot-shadow  { 0%,78%,100%{transform:scaleX(1);opacity:0.55} 84%{transform:scaleX(0.7);opacity:0.35} 92%{transform:scaleX(1.1);opacity:0.65} }
        @keyframes mascot-blink   { 0%,92%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} 97%{transform:scaleY(1)} }
        @keyframes mascot-mag     { 0%,100%{transform:rotate(-6deg) translate(0,0)} 50%{transform:rotate(6deg) translate(2px,-2px)} }
        @keyframes mascot-twinkle { 0%,100%{transform:scale(0.6);opacity:0.2} 50%{transform:scale(1.2);opacity:1} }

        @media (prefers-reduced-motion: reduce) {
          .mascot-float, .mascot-jump, .mascot-tilt,
          .mascot-shadow, .mascot-eyes, .mascot-mag, .sparkle {
            animation: none !important;
          }
        }
      ]]>
    </style>
  </defs>

  <g class="mascot-root">
    <g class="mascot-float">
      <g class="mascot-jump">
        <g class="mascot-tilt">
          <!-- Soft glow halo -->
          <circle cx="100" cy="105" r="70" fill="url(#mascot-glow)" />

          <!-- Ground shadow -->
          <ellipse class="mascot-shadow" cx="100" cy="178" rx="38" ry="5" fill="rgba(17,24,39,0.18)" />

          <!-- Body -->
          <circle cx="100" cy="100" r="52" fill="url(#mascot-body)" />

          <!-- Top highlight -->
          <ellipse cx="80" cy="78" rx="20" ry="12" fill="white" opacity="0.35" />

          <!-- Cheeks -->
          <circle cx="70" cy="115" r="9" fill="url(#mascot-cheek)" />
          <circle cx="130" cy="115" r="9" fill="url(#mascot-cheek)" />

          <!-- Eyes -->
          <g class="mascot-eyes">
            <ellipse cx="84" cy="100" rx="4.5" ry="6.5" fill="#111827" />
            <ellipse cx="116" cy="100" rx="4.5" ry="6.5" fill="#111827" />
            <circle cx="86" cy="97" r="1.6" fill="white" />
            <circle cx="118" cy="97" r="1.6" fill="white" />
          </g>

          <!-- Smile -->
          <path d="M 90 118 Q 100 126 110 118" stroke="#111827" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />

          <!-- Magnifying glass -->
          <g class="mascot-mag">
            <circle cx="145" cy="70" r="16" fill="white" fill-opacity="0.92" stroke="#5B6CFF" stroke-width="4" />
            <circle cx="140" cy="65" r="4" fill="white" opacity="0.7" />
            <line x1="157" y1="82" x2="170" y2="95" stroke="#5B6CFF" stroke-width="5" stroke-linecap="round" />
          </g>

          <!-- Sparkles -->
          <g>
            <path class="sparkle sparkle-a" d="M 40 55 L 42 60 L 47 62 L 42 64 L 40 69 L 38 64 L 33 62 L 38 60 Z" fill="#A855F7" />
            <path class="sparkle sparkle-b" d="M 170 125 L 172 130 L 177 132 L 172 134 L 170 139 L 168 134 L 163 132 L 168 130 Z" fill="#5B6CFF" />
            <circle class="sparkle sparkle-c" cx="165" cy="40" r="3" fill="#7B61FF" />
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
