<?xml version="1.0" encoding="UTF-8"?>
<!-- Reference SVG: image/photo mascot. See src/components/landing/mascots/image.tsx for source. -->
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="i-frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="50%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#7B61FF" />
    </linearGradient>
    <linearGradient id="i-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBCFE8" />
      <stop offset="100%" stop-color="#C4B5FD" />
    </linearGradient>
    <linearGradient id="i-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="i-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="100%" stop-color="#FBBF24" />
    </radialGradient>
    <style>
      <![CDATA[
        .mascot-float  { animation: mascot-float 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
        .mascot-jump   { animation: mascot-jump 4.8s cubic-bezier(0.28,0.84,0.42,1) infinite; transform-box: fill-box; transform-origin: center; }
        .mascot-tilt   { animation: mascot-tilt 5.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
        .mascot-shadow { animation: mascot-shadow 4.8s cubic-bezier(0.28,0.84,0.42,1) infinite; transform-box: fill-box; transform-origin: center; }
        .mascot-eyes   { animation: mascot-blink 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
        .mascot-mag    { animation: mascot-mag 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
        .sparkle       { transform-box: fill-box; transform-origin: center; }
        .sparkle-a     { animation: mascot-twinkle 2.4s ease-in-out infinite; }
        .sparkle-b     { animation: mascot-twinkle 2.4s ease-in-out 0.8s infinite; }
        .sparkle-c     { animation: mascot-twinkle 2.4s ease-in-out 1.6s infinite; }
        @keyframes mascot-float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        @keyframes mascot-jump    { 0%,78%,100%{transform:translateY(0) scaleY(1)} 84%{transform:translateY(-14px) scaleY(1.04)} 92%{transform:translateY(0) scaleY(0.94)} 96%{transform:translateY(-3px) scaleY(1.02)} }
        @keyframes mascot-tilt    { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
        @keyframes mascot-shadow  { 0%,78%,100%{transform:scaleX(1);opacity:0.55} 84%{transform:scaleX(0.7);opacity:0.35} 92%{transform:scaleX(1.1);opacity:0.65} }
        @keyframes mascot-blink   { 0%,92%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} 97%{transform:scaleY(1)} }
        @keyframes mascot-mag     { 0%,100%{transform:rotate(-6deg) translate(0,0)} 50%{transform:rotate(6deg) translate(2px,-2px)} }
        @keyframes mascot-twinkle { 0%,100%{transform:scale(0.6);opacity:0.2} 50%{transform:scale(1.2);opacity:1} }
      ]]>
    </style>
  </defs>

  <g class="mascot-float"><g class="mascot-jump"><g class="mascot-tilt">
    <circle cx="100" cy="105" r="70" fill="url(#i-glow)" />
    <ellipse class="mascot-shadow" cx="100" cy="178" rx="38" ry="5" fill="rgba(17,24,39,0.18)" />
    <rect x="45" y="55" width="110" height="90" rx="10" fill="url(#i-frame)" />
    <rect x="55" y="65" width="90" height="70" rx="4" fill="url(#i-sky)" />
    <g class="mascot-mag"><circle cx="135" cy="80" r="9" fill="url(#i-sun)" /></g>
    <path d="M 55 135 L 75 105 L 90 120 L 110 95 L 130 135 Z" fill="#7B61FF" />
    <path d="M 95 135 L 110 115 L 125 130 L 145 135 Z" fill="#5B6CFF" opacity="0.85" />
    <path d="M 88 128 Q 100 134 112 128" stroke="#111827" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <g class="mascot-eyes">
      <ellipse cx="78" cy="80" rx="3.5" ry="5" fill="#111827" />
      <ellipse cx="122" cy="80" rx="3.5" ry="5" fill="#111827" />
    </g>
    <path class="sparkle sparkle-a" d="M 36 50 L 38 55 L 43 57 L 38 59 L 36 64 L 34 59 L 29 57 L 34 55 Z" fill="#F472B6" />
    <path class="sparkle sparkle-b" d="M 168 110 L 170 115 L 175 117 L 170 119 L 168 124 L 166 119 L 161 117 L 166 115 Z" fill="#A855F7" />
    <circle class="sparkle sparkle-c" cx="170" cy="50" r="3" fill="#FBBF24" />
  </g></g></g>
</svg>
